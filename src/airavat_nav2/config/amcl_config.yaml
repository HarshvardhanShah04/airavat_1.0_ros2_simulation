amcl:
  ros__parameters:
    # Topic remapping
    scan_topic: /lidar/scan
    map_topic: /map
    
    # Frame IDs
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    global_frame_id: "map"
    
    # Initial pose
    set_initial_pose: false  # Set to true if you want to hardcode initial pose
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    
    # Transform tolerance
    transform_tolerance: 1.0
    
    # Particle filter parameters
    min_particles: 500
    max_particles: 2000
    
    # Update thresholds
    update_min_d: 0.25      # meters - minimum translation before update
    update_min_a: 0.2       # radians - minimum rotation before update
    
    # Resample interval
    resample_interval: 1
    
    # Laser model
    laser_model_type: "likelihood_field"
    laser_max_range: 100.0
    laser_min_range: -1.0
    max_beams: 60
    
    # Motion model (choose based on your robot type)
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    # For omnidirectional: "nav2_amcl::OmniMotionModel"
    
    # Odometry noise parameters (tune these based on your robot)
    alpha1: 0.2  # rotation noise from rotation
    alpha2: 0.2  # rotation noise from translation
    alpha3: 0.2  # translation noise from translation
    alpha4: 0.2  # translation noise from rotation
    alpha5: 0.2  # translation noise (omni only)
    
    # Recovery behaviors
    recovery_alpha_fast: 0.1
    recovery_alpha_slow: 0.001
    
    # Likelihood field parameters
    z_hit: 0.5
    z_rand: 0.5
    sigma_hit: 0.2
    laser_likelihood_max_dist: 2.0
    
    # TF broadcasting
    tf_broadcast: true
    
    # Other
    use_sim_time: false
    always_reset_initial_pose: false
    first_map_only: false